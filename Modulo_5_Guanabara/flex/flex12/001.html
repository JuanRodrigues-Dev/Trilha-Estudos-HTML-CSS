<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            background-color: lightblue;
            flex-flow: row nowrap;
        }
        .item{
            background-color: lightcoral;
            border:1px solid black;
            text-align: center;

        }
        div#ca{
            background-color: lightgreen;
            flex: 2 1 250px;
            
        }
         div#cb{
            background-color: lightyellow;
            flex: 3 1 250px;
                 
        }
         div#cc{
            background-color: lightpink;
            flex: 1 1 250px;
            
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="ca">A</div>
        <div class="item" id="cb">B</div>
        <div class="item" id="cc">C</div>
    </div>
</body>
</html>
