<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            background-color: lightblue;
            flex-flow: row wrap;
            align-items: flex-start;
            height: 400px;
        }
        .item{
            background-color: lightcoral;
            border:1px solid black;
            text-align: center;
            padding: 20px;
        }
        div#i1{
            align-self: flex-end;
        }
         div#i2{
            align-self: stretch;
        }
         div#i3{
            align-self: center;
        }
         div#i4{
            align-self: flex-start;
        }
         div#i5{
            align-self: stretch;
        }
         div#i6{
            align-self: flex-end;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i4">D</div>
        <div class="item" id="i5">F</div>
        <div class="item" id="i6">G</div>
    </div>
</body>
</html>
